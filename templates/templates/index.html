<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QRcraft Pro — Super UI</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/script.css"/>
</head>
<body>
  <div class="bg-layer">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="grid-lines"></div>
  </div>

  <div class="app-container">
    <header class="glass-header">
      <div class="logo">
        <div class="logo-icon">Q</div>
        <h1>QRcraft <span class="pro-tag">PRO</span></h1>
      </div>
      <div class="auth-status" id="auth-status">
        <button class="nav-btn" id="show-login-btn">Log In</button>
        <button class="nav-btn primary" id="show-register-btn">Sign Up</button>
      </div>
      <div class="user-status hidden" id="user-status">
        <span class="welcome-text">Welcome, <strong id="username-display">User</strong></span>
        <button class="nav-btn" id="show-history-btn">History</button>
        <button class="nav-btn outline" id="logout-btn">Log Out</button>
      </div>
    </header>

    <main class="main-layout">
      <section class="glass-panel controls-panel">
        <div class="view-section active" id="view-generator">
          <h2 class="section-title">Design Your QR Code</h2>
          <div class="input-group">
            <label>1. Content / URL</label>
            <input type="text" id="qr-input" placeholder="https://example.com" autocomplete="off"/>
            <p class="error-msg" id="qr-error">Please enter a valid URL or text.</p>
          </div>
          <div class="split-group">
            <div class="input-group">
              <label>2. QR Color</label>
              <input type="color" id="qr-color" value="#ffffff"/>
            </div>
            <div class="input-group">
              <label>3. Background</label>
              <input type="color" id="qr-bg" value="#111827"/>
            </div>
          </div>
          <div class="input-group">
            <label>4. Size (<span id="size-label">250px</span>)</label>
            <input type="range" id="size-slider" min="150" max="400" step="10" value="250"/>
          </div>
          <div class="input-group">
            <label>5. Custom Logo (Optional)</label>
            <label for="logo-upload" class="file-upload">
              <span id="upload-text">Click to browse or drop an image</span>
              <input type="file" id="logo-upload" accept="image/*" style="display:none;"/>
            </label>
            <button id="remove-logo" class="text-btn hidden">Remove Logo</button>
          </div>
          <button id="generate-btn" class="action-btn glow-btn">Generate QR Code</button>
        </div>

        <div class="view-section hidden" id="view-auth">
          <h2 class="section-title" id="auth-title">Log In</h2>
          <div class="input-group" id="group-username" style="display:none;">
            <label>Username</label>
            <input type="text" id="auth-username" placeholder="johndoe"/>
          </div>
          <div class="input-group">
            <label>Email</label>
            <input type="email" id="auth-email" placeholder="you@example.com"/>
          </div>
          <div class="input-group">
            <label>Password</label>
            <input type="password" id="auth-password" placeholder="••••••••"/>
          </div>
          <p class="error-msg" id="auth-error"></p>
          <button id="auth-submit" class="action-btn glow-btn">Log In</button>
          <p class="switch-auth">
            <span id="auth-switch-text">Don't have an account? <a href="#" id="auth-switch-link">Sign Up</a></span>
          </p>
          <button id="back-to-gen" class="text-btn mt-4">← Back to Generator</button>
        </div>

        <div class="view-section hidden" id="view-history">
          <div class="history-header">
            <h2 class="section-title">Your QR History</h2>
            <button id="clear-history-btn" class="text-error-btn">Clear All</button>
          </div>
          <div class="history-list" id="history-list">
          </div>
          <button id="back-to-gen-history" class="text-btn mt-4">← Back to Generator</button>
        </div>
      </section>

      <section class="glass-panel preview-panel">
        <div class="preview-container">
          <div id="empty-state" class="empty-state">
            <div class="empty-icon">
                <svg viewBox="0 0 80 80" fill="none" width="80" height="80">
                <rect x="8" y="8" width="26" height="26" rx="4" stroke="currentColor" stroke-width="2" stroke-dasharray="4 3"/>
                <rect x="46" y="8" width="26" height="26" rx="4" stroke="currentColor" stroke-width="2" stroke-dasharray="4 3"/>
                <rect x="8" y="46" width="26" height="26" rx="4" stroke="currentColor" stroke-width="2" stroke-dasharray="4 3"/>
                <path d="M46 52h8M54 46v8M60 46v14M60 54h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </div>
            <p style="font-size: 1.1rem; font-weight: 500;">Your stunning QR code will appear here.</p>
            <p style="font-size: 0.9rem; margin-top: 0.5rem; opacity: 0.7;">Fill in your details and hit generating!</p>
          </div>
          
          <div id="loader" class="loader hidden">
            <div class="spinner"></div>
            <p style="font-weight: 500;">Crafting your QR Code...</p>
          </div>
          
          <div id="qr-result" class="qr-result hidden">
            <div class="qr-frame">
              <canvas id="qr-canvas"></canvas>
            </div>
            <div class="action-row">
              <button id="download-btn" class="action-btn primary">Download PNG</button>
              <button id="copy-btn" class="action-btn secondary">Copy Link</button>
              <button id="share-btn" class="action-btn secondary">Share</button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="toast" class="toast hidden"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="/static/js/style.js"></script>
</body>
</html>
